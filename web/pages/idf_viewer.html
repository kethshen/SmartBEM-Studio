<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDF Diff Viewer - SmartHVAC Studio</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icons/bolt_boost_48dp_14EF10_FILL0_wght400_GRAD0_opsz48.svg">



    <!-- Diff Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root {
            --bg-app: #121212;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --success: #4caf50;
            --error: #f44336;
            --added-bg: #1e3a23;
            --removed-bg: #3e1b1b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            min-width: 0;
            /* Important for flex text overflow */
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-header {
            padding: 0.5rem 1rem;
            background: #252525;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid #333;
            font-weight: bold;
        }

        #diffContainer {
            flex: 1;
            overflow: auto;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .diff-line {
            white-space: pre-wrap;
            padding: 2px 4px;
        }

        .diff-added {
            background-color: var(--added-bg);
            color: #a5d6a7;
        }

        .diff-removed {
            background-color: var(--removed-bg);
            color: #ef9a9a;
            text-decoration: line-through;
            opacity: 0.7;
        }

        .diff-header {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 1rem;
            border-top: 1px dashed #444;
            padding-top: 0.5rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>

    <header>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <h1 id="pageTitle">IDF Diff Viewer</h1>
            <span id="jobIdDisplay"
                style="font-family: monospace; color: var(--text-secondary); font-size: 0.9rem;"></span>
        </div>
        <button onclick="window.close()"
            style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:0.9rem;">Close</button>
    </header>

    <div id="diffContainer">
        <div class="loading">Loading files for comparison...</div>
    </div>

    <script>
        // IDF Diff Viewer — Firebase dependency removed.
        // This page previously fetched IDF files from Firebase Storage.
        // TODO: Rewire to fetch from FastAPI backend endpoint (e.g. GET /jobs/{id}/idf)
        const container = document.getElementById("diffContainer");
        container.innerHTML = `<div style="padding:2rem; color: #f59e0b; text-align:center;">
            <strong>⚠️ IDF Viewer Temporarily Unavailable</strong><br><br>
            This viewer has been migrated away from Firebase.<br>
            It will be rewired to the FastAPI backend in a future update.
        </div>`;
    </script>

</body>

</html>
