<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDF Diff Viewer - SmartHVAC Studio</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icons/bolt_boost_48dp_14EF10_FILL0_wght400_GRAD0_opsz48.svg">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Diff Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root {
            --bg-app: #121212;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --success: #4caf50;
            --error: #f44336;
            --added-bg: #1e3a23;
            --removed-bg: #3e1b1b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            min-width: 0;
            /* Important for flex text overflow */
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-header {
            padding: 0.5rem 1rem;
            background: #252525;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid #333;
            font-weight: bold;
        }

        #diffContainer {
            flex: 1;
            overflow: auto;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .diff-line {
            white-space: pre-wrap;
            padding: 2px 4px;
        }

        .diff-added {
            background-color: var(--added-bg);
            color: #a5d6a7;
        }

        .diff-removed {
            background-color: var(--removed-bg);
            color: #ef9a9a;
            text-decoration: line-through;
            opacity: 0.7;
        }

        .diff-header {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 1rem;
            border-top: 1px dashed #444;
            padding-top: 0.5rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>

    <header>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <h1 id="pageTitle">IDF Diff Viewer</h1>
            <span id="jobIdDisplay"
                style="font-family: monospace; color: var(--text-secondary); font-size: 0.9rem;"></span>
        </div>
        <button onclick="window.close()"
            style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:0.9rem;">Close</button>
    </header>

    <div id="diffContainer">
        <div class="loading">Loading files for comparison...</div>
    </div>

    <script type="module">
        import { firebaseConfig } from "../firebaseConfig.js";

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        // Get Job ID from URL Params
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('jobId');

        const container = document.getElementById("diffContainer");
        const titleDisplay = document.getElementById("pageTitle");
        const idDisplay = document.getElementById("jobIdDisplay");

        if (!jobId) {
            container.innerHTML = "<div style='padding:2rem; color:red;'>Error: No Job ID provided in URL.</div>";
        } else {
            idDisplay.innerText = `Job: ${jobId}`;
            loadAndCompare(jobId);
        }

        async function checkFileExists(path) {
            try {
                await storage.ref(path).getMetadata();
                return true;
            } catch {
                return false;
            }
        }

        async function loadAndCompare(id) {
            try {
                // Paths
                // 1. Template (Before) - Base.idf
                const templatePath = "templates/Base.idf";

                // 2. Generated (After) - jobs/{id}/in.idf
                const generatedPath = `jobs/${id}/in.idf`;

                // Check if files exist first
                const [templateExists, generatedExists] = await Promise.all([
                    checkFileExists(templatePath),
                    checkFileExists(generatedPath)
                ]);

                if (!templateExists) throw new Error(`Base Template not found at ${templatePath}`);
                if (!generatedExists) throw new Error(`Generated IDF not found at ${generatedPath}`);

                // Get URLs
                const templateUrl = await storage.ref(templatePath).getDownloadURL();
                const generatedUrl = await storage.ref(generatedPath).getDownloadURL();

                // Fetch Text Content
                const [resTemplate, resGenerated] = await Promise.all([
                    fetch(templateUrl),
                    fetch(generatedUrl)
                ]);

                const textTemplate = await resTemplate.text();
                const textGenerated = await resGenerated.text();

                // Compute Diff
                renderDiff(textTemplate, textGenerated);

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div style="padding:2rem; color: #f44336;">
          <strong>Error loading files:</strong><br>${error.message}<br><br>
          Ensure data is uploaded to Firebase Storage correctly.
        </div>`;
            }
        }

        function renderDiff(oldText, newText) {
            container.innerHTML = ""; // Clear loading

            // Use jsdiff to compute line-by-line diff
            const diff = Diff.diffLines(oldText, newText);

            const fragment = document.createDocumentFragment();

            diff.forEach((part) => {
                // part.added, part.removed, part.value

                // If unchanged, showing it adds context but too much noise for large files.
                // Let's show everything to be safe, but style differently.

                // Split into lines to handle styling per line
                const lines = part.value.split('\n');

                // Remove last empty string if split causes it
                if (lines[lines.length - 1] === '') lines.pop();

                lines.forEach(line => {
                    const div = document.createElement('div');
                    div.className = 'diff-line';
                    div.textContent = line; // Safe text

                    if (part.added) {
                        div.classList.add('diff-added');
                        div.textContent = "+ " + line;
                    } else if (part.removed) {
                        div.classList.add('diff-removed');
                        div.textContent = "- " + line;
                    } else {
                        div.style.color = "#666"; // Dim unchanged text
                        div.textContent = "  " + line;
                    }

                    fragment.appendChild(div);
                });
            });

            container.appendChild(fragment);
        }
    </script>
</body>

</html>
