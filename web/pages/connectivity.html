<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connectivity - SmartHVAC Studio</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <span>⚡ SmartHVAC</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="nlp.html" class="nav-link">Dashboard</a></li>
                <li><a href="results.html" class="nav-link">Results</a></li>
                <li><a href="config.html" class="nav-link">Config</a></li>
                <!-- <li><a href="connectivity.html" class="nav-link active">Connectivity</a></li> -->
                <li><a href="architecture.html" class="nav-link">Architecture</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Connectivity Debug</h1>
                <p class="page-subtitle">Real-time log of Firestore actions for debugging purposes.</p>
            </header>

            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">Live Actions</h2>
                </div>
                <ul id="logList"
                    style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-secondary);">
                    <li>Attempting to connect to Firestore...</li>
                </ul>
            </section>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <!-- Inline Script for Connectivity -->
    <script type="module">
        import { firebaseConfig } from "../firebaseConfig.js";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(msg) {
            const ul = document.getElementById("logList");
            const li = document.createElement("li");
            li.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            li.style.marginBottom = "0.5rem";
            ul.prepend(li);
        }

        log("Firebase initialized.");

        // Listen for ANY change in 'test_connectivity' collection
        db.collection("test_connectivity").orderBy("timestamp", "desc").limit(5)
            .onSnapshot((snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        log(`Received: ${data.message} (ID: ${change.doc.id})`);
                    }
                });
            }, (error) => {
                log(`Error: ${error.message}`);
                const li = document.createElement("li");
                li.innerText = "Check your Console for details.";
                li.style.color = "red";
                document.getElementById("logList").prepend(li);
            });
    </script>
</body>

</html>
