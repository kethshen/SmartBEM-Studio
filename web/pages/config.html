<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration - SmartHVAC Studio</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <span>⚡ SmartHVAC</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="nlp.html" class="nav-link">Dashboard</a></li>
                <li><a href="results.html" class="nav-link">Results</a></li>
                <li><a href="config.html" class="nav-link active">Config</a></li>
                <!-- <li><a href="connectivity.html" class="nav-link">Connectivity</a></li> -->
                <li><a href="architecture.html" class="nav-link">Architecture</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Global Settings</h1>
                <p class="page-subtitle">Configure default parameters for new simulation jobs.</p>
            </header>

            <div style="max-width: 600px;">
                <section class="card">
                    <div class="card-header">
                        <h2 class="card-title">Preferences</h2>
                    </div>

                    <div class="form-group">
                        <label for="weather">Default Weather Location</label>
                        <select id="weather">
                            <option value="Colombo, Sri Lanka">Colombo, Sri Lanka</option>
                            <option value="New York, USA">New York, USA</option>
                            <option value="London, UK">London, UK</option>
                        </select>
                        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
                            Note: The dashboard has its own weather selector which overrides this.
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="duration">Simulation Duration (Days)</label>
                        <input type="number" id="duration" value="7" min="1" max="365">
                    </div>

                    <div class="form-group"
                        style="border-top: 1px solid var(--border-subtle); padding-top: 1rem; margin-top: 1rem;">
                        <label>Advanced Options</label>
                        <div style="display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem;">
                            <input type="checkbox" id="enableEKF" checked style="width: auto;">
                            <label for="enableEKF" style="margin: 0; font-weight: 400;">Enable EKF Estimation</label>
                        </div>
                        <div style="display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem;">
                            <input type="checkbox" id="enableLogging" style="width: auto;">
                            <label for="enableLogging" style="margin: 0; font-weight: 400;">Enable Verbose
                                Logging</label>
                        </div>
                    </div>

                    <div class="mt-4" style="display: flex; align-items: center; gap: 1rem;">
                        <button onclick="saveConfig()" class="btn btn-primary">
                            Save Changes
                        </button>
                        <span id="saveMsg" style="color: var(--success); font-weight: 500;"></span>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        console.log("Config page script running...");
        // Simple Config Manager using LocalStorage (Layer 1 State)

        function loadConfig() {
            const saved = localStorage.getItem("smartHVAC_config");
            if (saved) {
                const config = JSON.parse(saved);
                if (config.weather) document.getElementById("weather").value = config.weather;
                if (config.duration) document.getElementById("duration").value = config.duration;
                document.getElementById("enableEKF").checked = config.enableEKF;
                document.getElementById("enableLogging").checked = config.enableLogging;
            }
        }

        function saveConfig() {
            const config = {
                weather: document.getElementById("weather").value,
                duration: document.getElementById("duration").value,
                enableEKF: document.getElementById("enableEKF").checked,
                enableLogging: document.getElementById("enableLogging").checked,
                savedAt: new Date().toISOString()
            };

            localStorage.setItem("smartHVAC_config", JSON.stringify(config));

            const msg = document.getElementById("saveMsg");
            msg.innerText = "Settings Saved!";
            setTimeout(() => msg.innerText = "", 2000);
        }

        // Load defaults on run
        loadConfig();
    </script>
</body>

</html>
